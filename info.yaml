# Tiny Tapeout project information
project:
  title:        "Desk-Buddy"      # Project title
  author:       "Eraz Ahmed"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A fun toy for every office desk"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_luck_engine"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
 # Inputs
    ui[0]: "mode_sel[0] - live mode selector bit 0"
    ui[1]: "mode_sel[1] - live mode selector bit 1"
    ui[2]: "mode_sel[2] - live mode selector bit 2 (000=COIN, 001=BUSY, 010=SPRINT, 011=MEETING, 100=TASK, 101=DUEL)"
    ui[3]: "btn_go - main trigger / confirm button (debounced)"
    ui[4]: "btn_tap - count tap / player-1 button (debounced, handles time add & double-click)"
    ui[5]: "btn_p2 - player-2 button in DUEL mode (debounced)"
    ui[6]: "btn_reset - cancel/return to idle button (debounced)"
    ui[7]: "reserved - tie low"

    # Outputs
    uo[0]: "mode_active - active high whenever the engine is not in IDLE"
    uo[1]: "p1_ready - player-1 armed indicator flag in DUEL countdown"
    uo[2]: "p2_ready - player-2 armed indicator flag in DUEL countdown"
    uo[3]: "warn - meeting countdown 80% elapsed alert flag"
    uo[4]: "timer_run - active high during SPRINT, MEETING, or BUSY tracking sessions"
    uo[5]: "alarm - active high during SPRINT_DONE, MEET_DONE, or DUEL_RESULT states"
    uo[6]: "busy_light - desk status indicator LED driver for live BUSY mode"
    uo[7]: "penalty_win - flags if the DUEL victory was determined by a false-start penalty"

    # Bidirectional pins
    uio[0]: "tm_clk - TM1637 serial clock line for external 4-digit display (always output)"
    uio[1]: "tm_dio - TM1637 bidirectional serial data line for external 4-digit display"
    uio[2]: ""
    uio[3]: ""
    uio[4]: ""
    uio[5]: ""
    uio[6]: ""
    uio[7]: ""

# Do not change!
yaml_version: 6
